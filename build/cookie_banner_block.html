<!-- ============================================================
     Cookie consent banner — first-visit only, dismissible,
     remembers choice in localStorage forever (until cleared).
     BWiGA branded, GDPR-style language.
     ============================================================ -->
<div class="cookie-banner" id="cookie-banner" hidden role="dialog" aria-live="polite" aria-label="Cookie consent">
  <div class="cookie-banner-inner">
    <div class="cookie-banner-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21.5 11.05a9.998 9.998 0 11-8.55-8.55"/>
        <path d="M21 4.5l-2 2-2-2M19 6.5V2"/>
        <circle cx="9" cy="11" r="1.2" fill="currentColor"/>
        <circle cx="15" cy="14" r="1.2" fill="currentColor"/>
        <circle cx="11" cy="16" r="1" fill="currentColor"/>
        <circle cx="13" cy="8" r="0.9" fill="currentColor"/>
      </svg>
    </div>
    <div class="cookie-banner-text">
      <strong>This site uses cookies.</strong>
      We use essential cookies to make BWiGA Accelerator work, and analytics cookies to understand how visitors use the site so we can improve it. No data is sold or shared with third parties for advertising. Read our
      <a href="privacy-policy.html">Privacy Policy</a>.
    </div>
    <div class="cookie-banner-actions">
      <button type="button" class="cookie-btn cookie-btn-decline" id="cookie-decline">
        Decline
      </button>
      <button type="button" class="cookie-btn cookie-btn-accept" id="cookie-accept">
        Accept
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
/* =============================================================================
   Cookie banner — show only on first visit, persist choice in localStorage.
   Choice keys:  bwiga-cookie-consent: "accepted" | "declined"
   ============================================================================= */
(function () {
  'use strict';
  const STORAGE_KEY = 'bwiga-cookie-consent';
  const banner    = document.getElementById('cookie-banner');
  const acceptBtn = document.getElementById('cookie-accept');
  const declineBtn = document.getElementById('cookie-decline');
  if (!banner || !acceptBtn || !declineBtn) return;

  // Safe storage access — some browsers block localStorage in private mode
  function readChoice() {
    try { return localStorage.getItem(STORAGE_KEY); }
    catch (e) { return null; }
  }
  function writeChoice(value) {
    try { localStorage.setItem(STORAGE_KEY, value); }
    catch (e) { /* private mode — silently no-op */ }
  }

  // Don't show banner if user has already chosen
  const existing = readChoice();
  if (existing === 'accepted' || existing === 'declined') return;

  // Reveal banner with a small delay so it doesn't compete with first paint
  setTimeout(() => {
    banner.hidden = false;
    requestAnimationFrame(() => banner.classList.add('is-visible'));
  }, 700);

  function hideAndStore(value) {
    writeChoice(value);
    banner.classList.remove('is-visible');
    setTimeout(() => { banner.hidden = true; }, 380);
    // Custom event for analytics scripts to hook into when ready
    document.dispatchEvent(new CustomEvent('bwiga:cookie-consent', {
      detail: { choice: value }
    }));
  }

  acceptBtn.addEventListener('click', () => hideAndStore('accepted'));
  declineBtn.addEventListener('click', () => hideAndStore('declined'));
})();
</script>
